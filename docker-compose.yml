services:

  # ─── DATABASE UNIQUE ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kyntus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres@2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-network

  # ─── BACKENDS ─────────────────────────────────────────
  auth-backend:
    build:
      context: ./AuthService/AuthService
      dockerfile: Dockerfile
    container_name: kyntus_auth_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=auth_db;Username=auth_user;Password=Auth@2026"
    ports:
      - "5220:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-network

  planning-backend:
    build:
      context: ./PlanningService/PlanningService
      dockerfile: Dockerfile
    container_name: kyntus_planning_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=kyntus_db;Username=kyntus_user;Password=Kyntus@2026"
    ports:
      - "5201:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-network

  documentation-backend:
    build:
      context: ./documentation_service_backend
      dockerfile: Dockerfile
    container_name: documentation_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Documentation: "Host=postgres;Port=5432;Database=mykyntus_documentation;Username=documentation_user;Password=Htelgroupe!2025"
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-network

  parrainage-backend:
    build:
      context: ./parrainage_service_backend
    container_name: parrainage_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5003:8080"
    networks:
      - microservices-network

  prime-backend:
    build:
      context: ./prime_service_backend
    container_name: prime_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5001:8080"
    networks:
      - microservices-network

  # ─── API GATEWAY ──────────────────────────────────────
  api-gateway:
    build:
      context: ./ApiGateway.API/ApiGateway.API
      dockerfile: Dockerfile
    container_name: kyntus_gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5000:8080"
    depends_on:
      - auth-backend
      - planning-backend
    networks:
      - microservices-network

  # ─── FRONTENDS ────────────────────────────────────────
  auth-frontend:
    build:
      context: ./auth-frontend
      dockerfile: DockerFile
    container_name: kyntus_auth_frontend
    restart: unless-stopped
    ports:
      - "4201:4000"
    environment:
      - API_URL=http://api-gateway:8080
    depends_on:
      - api-gateway
    networks:
      - microservices-network

  planning-frontend:
    build:
      context: ./projet_kyntus_service_planning-frontend
      dockerfile: Dockerfile
    container_name: kyntus_planning_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    networks:
      - microservices-network

  documentation-frontend:
    build:
      context: ./documentation_service_frontend
      dockerfile: Dockerfile
    container_name: documentation_frontend
    restart: unless-stopped
    ports:
      - "4202:80"
    depends_on:
      - documentation-backend
    networks:
      - microservices-network

  parrainage-frontend:
    build:
      context: ./parrainage_service_frontend
    container_name: parrainage_frontend
    restart: unless-stopped
    ports:
      - "4203:80"
    depends_on:
      - parrainage-backend
    networks:
      - microservices-network

  prime-frontend:
    build:
      context: ./prime_service_frontend
    container_name: prime_frontend
    restart: unless-stopped
    ports:
      - "4204:80"
    depends_on:
      - prime-backend
    networks:
      - microservices-network

  # ─── MINIO ────────────────────────────────────────────
  documentation-minio:
    image: minio/minio:latest
    container_name: documentation_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - microservices-network

  # ─── PGADMIN ──────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: kyntus_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kyntus.ma
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - microservices-network

volumes:
  postgres_data:

networks:
  microservices-network:
    driver: bridge