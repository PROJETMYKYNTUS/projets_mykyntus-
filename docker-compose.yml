version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: kyntus_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kyntus_db
      POSTGRES_USER: kyntus_user
      POSTGRES_PASSWORD: Kyntus@2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5544:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyntus_user -d kyntus_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./PlanningService/PlanningService
      dockerfile: Dockerfile
    container_name: kyntus_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=kyntus_db;Username=kyntus_user;Password=Kyntus@2026"
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./projet_kyntus_service_planning-frontend
      dockerfile: Dockerfile
    container_name: kyntus_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: kyntus_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kyntus.ma
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5051:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
