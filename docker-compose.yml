version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kyntus_planningauth_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres@2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-network

  auth-backend:
    build:
      context: ./AuthService/AuthService
      dockerfile: Dockerfile
    container_name: kyntus_auth_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=auth_db;Username=auth_user;Password=Auth@2026"
    ports:
      - "5220:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-network

  planning-backend:
    build:
      context: ./PlanningService/PlanningService
      dockerfile: Dockerfile
    container_name: kyntus_planning_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=kyntus_db;Username=kyntus_user;Password=Kyntus@2026"
    ports:
      - "5201:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-network

  api-gateway:
    build:
      context: ./ApiGateway.API/ApiGateway.API
      dockerfile: Dockerfile
    container_name: kyntus_gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5200:8080"
    depends_on:
      - auth-backend
      - planning-backend
    networks:
      - microservices-network

  auth-frontend:
    build:
      context: ./auth-frontend
      dockerfile: DockerFile
    container_name: kyntus_auth_frontend
    restart: unless-stopped
    ports:
      - "4201:4000"
    environment:
      - API_URL=http://api-gateway:8080
    depends_on:
      - api-gateway
    networks:
      - microservices-network

  planning-frontend:
    build:
      context: ./projet_kyntus_service_planning-frontend
      dockerfile: Dockerfile
    container_name: kyntus_planning_frontend
    restart: unless-stopped
    ports:
      - "4202:80"
    depends_on:
      - api-gateway
    networks:
      - microservices-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: kyntus_pgadmin_new
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kyntus.ma
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - microservices-network

volumes:
  postgres_data:

networks:
  microservices-network:
    driver: bridge
